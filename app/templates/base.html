<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Kanban Доска{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-brand" data-text="Kanban Board">Kanban Board</a>
            <div class="nav-menu">
                <a href="/" class="nav-link">Главная</a>
                {% if user %}
                    <a href="/my-boards" class="nav-link">Мои доски</a>
                    <a href="/boards/new" class="nav-link">+ Новая доска</a>
                    <div class="nav-user">
                        <span class="nav-username">{{ user.username }}</span>
                        <a href="/auth/logout" class="nav-link">Выйти</a>
                    </div>
                {% else %}
                    <a href="/auth/login" class="nav-link">Войти</a>
                    <a href="/auth/register" class="nav-link btn-register">Регистрация</a>
                {% endif %}
            </div>
        </div>
    </nav>





    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <script src="/static/js/kanban.js"></script>
    {% block scripts %}{% endblock %}

</body>
</html>
