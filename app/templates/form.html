{% extends "base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="form-container">
    <h1>{{ title }}</h1>
    
    <form action="/boards/new" method="post" class="board-form">
        <div class="form-group">
            <label for="name">Название доски *</label>
            <input type="text" id="name" name="name" required 
                   placeholder="Например: Разработка, Личные дела, Путешествие">
        </div>
        
        <div class="form-group">
            <label for="description">Описание</label>
            <textarea id="description" name="description" rows="4" 
                      placeholder="Опишите цель этой доски..."></textarea>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Создать доску</button>
            <a href="/" class="btn btn-secondary">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
